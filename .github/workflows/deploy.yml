name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Test imports
        run: |
          python -c "import streamlit, fastapi, crewai; print('All imports successful')"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            yourusername/insurance-assistant:latest
            yourusername/insurance-assistant:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull yourusername/insurance-assistant:latest
            
            # Stop and remove old container
            docker stop insurance-app || true
            docker rm insurance-app || true
            
            # Run new container with environment variables
            docker run -d \
              --name insurance-app \
              -p 8501:8501 \
              -p 8000:8000 \
              --restart unless-stopped \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e SERPAPI_API_KEY="${{ secrets.SERPAPI_API_KEY }}" \
              -e HF_API_TOKEN="${{ secrets.HF_API_TOKEN }}" \
              yourusername/insurance-assistant:latest
              
            echo "Deployment complete! Frontend: http://$(curl -s ifconfig.me):8501"